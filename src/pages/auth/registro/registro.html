<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../style.css" />
</head>
<body>
    <div class="registro-card">
        <h1 class="registro-card__logo">FOOD STORE</h1>
        <h2 class="registro-card__title">Registro</h2>

        <form class="registro-card__form" id="registro-form">
            <div>
                <label class="registro-card__label" for="email">Email:</label>
                <input class="registro-card__input" type="email" id="email" 
                    name="email" required placeholder="Ingrese tu email" />
            </div>

            <div>
                <label class="registro-card__label" for="password">Contraseña:</label>
                <input class="registro-card__input" type="password" id="password" 
                    name="password" required placeholder="******" />
            </div>

            <!-- Selector de rol: solo para el registro -->
            <div>
                <label class="registro-card__label" for="rol">Rol:</label>
                <select class="registro-card__input" id="rol" name="rol" required>
                    <option value="">Seleccioná un rol</option>
                    <option value="client">Cliente</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <p class="registro-card__error-message" id="error-msg"></p>

            <button class="registro-card__button" type="submit">Registrarse</button>
        </form>

        <div class="registro-card__footer">
            <p class="registro-card__text">¿Ya tienes una cuenta?</p>
            <a class="registro-card__link" href="../login/login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
